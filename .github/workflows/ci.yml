name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v3
        with:
          install: true

      - name: Run test
        run: task ci

      - name: Check generated files are up to date
        run: |
          if ! git diff --quiet; then
            echo "❌ Generated files are out of date. Please run 'task build' locally and commit the changes."
            echo ""
            echo "Files with changes:"
            git diff --name-only
            echo ""
            echo "Diff (partially):"
            for file in $(git diff --name-only); do
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "File: $file"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              git diff "$file" | head -20
              echo ""
            done
            exit 1
          fi
