name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      artifact_hash: ${{ steps.artifact-hash.outputs.artifact_hash }}
    env:
      MISE_LOCKED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          install: true

      - name: Cache pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache uv cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Setup Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Export build metadata
        run: |
          echo "VITE_BUILD_HASH=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_ENV"
          echo "VITE_BUILD_DATE=$(git show -s --format=%cI HEAD)" >> "$GITHUB_ENV"

      - name: Run test
        run: task ci -p

      - name: Check generated files are up to date
        run: |
          if ! git diff --quiet; then
            echo "❌ Generated files are out of date. Please run 'task build' locally and commit the changes."
            echo ""
            echo "Files with changes:"
            git diff --name-only
            echo ""
            echo "Diff (partially):"
            for file in $(git diff --name-only); do
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "File: $file"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              git diff "$file" | head -20
              echo ""
            done
            exit 1
          fi

      - name: Compute artifact hash
        id: artifact-hash
        run: |
          artifact_hash="$(
            find dist -type f -print0 \
              | sort -z \
              | xargs -0 sha256sum \
              | sha256sum \
              | cut -d' ' -f1
          )"
          echo "artifact_hash=$artifact_hash" >> "$GITHUB_OUTPUT"
          echo "Artifact hash: $artifact_hash"

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: ./dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: test-and-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Restore deployed hash cache
        id: deployed-hash-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: /tmp/pages-artifact-hash
          key: pages-artifact-${{ needs.test-and-build.outputs.artifact_hash }}

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.deployed-hash-cache.outputs.cache-hit != 'true'
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

      - name: Write deployed hash marker
        if: steps.deployed-hash-cache.outputs.cache-hit != 'true' && steps.deployment.outcome == 'success'
        env:
          ARTIFACT_HASH: ${{ needs.test-and-build.outputs.artifact_hash }}
        run: |
          mkdir -p /tmp/pages-artifact-hash
          printf '%s\n' "$ARTIFACT_HASH" > /tmp/pages-artifact-hash/hash.txt

      - name: Save deployed hash cache
        if: steps.deployed-hash-cache.outputs.cache-hit != 'true' && steps.deployment.outcome == 'success'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: /tmp/pages-artifact-hash
          key: pages-artifact-${{ needs.test-and-build.outputs.artifact_hash }}
