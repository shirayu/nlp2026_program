version: "3"

vars:
  FILE_PYPROJECT: '{{.ROOT_DIR}}/pyproject.toml'
  FILE_UV_LOCK: '{{.ROOT_DIR}}/uv.lock'
  FILE_PACKAGE_JSON: '{{.ROOT_DIR}}/package.json'
  FILE_PNPM_LOCK: '{{.ROOT_DIR}}/pnpm-lock.yaml'
  DIR_NODE_MODULES: '{{.ROOT_DIR}}/node_modules'


tasks:
  default:
    cmds:
      - task: install
      - task: extract
      - task: format
      - task: lint
      - task: test
      - task: build

  ci:
    cmds:
      - task: install
      - task: format
      - task: lint
      - task: test
      - task: build


  install:
    desc: "Install project dependencies"
    deps: [deps:python, deps:node]

  deps:python:
    desc: "Sync Python dependencies"
    sources:
      - '{{.FILE_PYPROJECT}}'
      - '{{.FILE_UV_LOCK}}'
    generates:
      - '{{.ROOT_DIR}}/.venv/pyvenv.cfg'
    cmds:
      - uv sync

  deps:node:
    desc: "Install Node dependencies"
    sources:
      - '{{.FILE_PACKAGE_JSON}}'
      - '{{.FILE_PNPM_LOCK}}'
    generates:
      - '{{.DIR_NODE_MODULES}}/.modules.yaml'
    cmds:
      - 'pnpm i --frozen-lockfile'

  dev:
    desc: "開発サーバー起動"
    cmds:
      - pnpm exec vite

  build:
    desc: "フロントエンドをビルド"
    cmds:
      - pnpm exec tsc -b
      - pnpm exec vite build
    sources:
      - src/**/*
      - index.html
      - public/**/*
    generates:
      - dist/**/*

  test:
    desc: "テストを実行"
    cmds:
      - pnpm exec vitest run

  lint:
    desc: "Ruff / Pyright / Biome / typos で lint を並列実行"
    deps:
      - lint:ruff
      - lint:pyright
      - lint:biome
      - lint:typos

  lint:ruff:
    cmds:
      - uv run --group dev ruff check .

  lint:pyright:
    cmds:
      - uv run pnpm exec pyright

  lint:biome:
    cmds:
      - pnpm exec biome check --error-on-warnings .

  lint:typos:
    cmds:
      - typos --config _typos.toml

  format:
    desc: "Ruff と Biome で整形と import 整理を実行"
    cmds:
      - uv run --group dev ruff check --fix .
      - uv run --group dev ruff format .
      - pnpm exec biome check --write .

  preview:
    desc: "ビルド成果物をプレビュー"
    deps:
      - build
    cmds:
      - pnpm exec vite preview

  clean:
    desc: "ビルド成果物を削除"
    cmds:
      - rm -rf dist
      - rm -rf public/data.json

  extract:
    desc: "HTMLからJSONを抽出する"
    vars:
      HTML: '{{.HTML | default "data_for_extraction/original_program.html"}}'
      OUT: '{{.OUT | default "public/data.json"}}'
      BASE_URL: '{{.BASE_URL | default "https://www.anlp.jp/proceedings/annual_meeting/2026/"}}'
      WORKSHOP_CONFIG: '{{.WORKSHOP_CONFIG | default "data_for_extraction/workshop.json"}}'
      INVITEDPAPERS_CONFIG: '{{.INVITEDPAPERS_CONFIG | default "data_for_extraction/invitedpapers.json"}}'
      YOUTUBE_CONFIG: '{{.YOUTUBE_CONFIG | default "data_for_extraction/youtube.json"}}'
    cmds:
      - 'uv run extract.py --html {{.HTML}} --out {{.OUT}} --base-url {{.BASE_URL}} --workshop-config {{.WORKSHOP_CONFIG}} --invitedpapers-config {{.INVITEDPAPERS_CONFIG}} --youtube-config {{.YOUTUBE_CONFIG}}'
    sources:
      - extract.py
      - "{{.HTML}}"
      - data_for_extraction/workshop.json
      - data_for_extraction/invitedpapers.json
      - data_for_extraction/youtube.json
    generates:
      - "{{.OUT}}"
